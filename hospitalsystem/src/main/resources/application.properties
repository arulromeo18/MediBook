# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/hospitaldb
spring.data.mongodb.database=hospitaldb

# Server
server.port=8080

# JWT - must be at least 32 characters for HMAC-SHA256
jwt.secret=MyHospitalSecretKey2024VeryLongSecureStringForProduction
jwt.expiration=86400000

# Logging
logging.level.org.springframework.security=WARN
logging.level.com.hospital=INFO

# Disable open session in view warning
spring.jpa.open-in-view=false
